<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tuner</title>
<meta name="theme-color" content="#1b130c" />
<meta name="description" content="A chromatic guitar tuner that works offline." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
  @font-face {
    font-family: 'Fraunces';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/fraunces-latin-600-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/inter-latin-400-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/inter-latin-500-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/inter-latin-600-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Space Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/space-mono-latin-400-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Space Mono';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('fonts/space-mono-latin-700-normal.woff2') format('woff2');
  }
</style>
<style>
  :root {
    --bg: #1b130c;
    --surface: #2b2014;
    --surface-line: #3c2d1c;
    --gold: #e3a548;
    --gold-soft: #c79f6f;
    --cream: #f4ead9;
    --muted: #a78a6c;
    --in-tune: #9bc06a;
    --off: #d9764f;
    --shadow: rgba(0, 0, 0, 0.45);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; min-height: 100%; }

  body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 50% -10%, #382818 0%, var(--bg) 55%, #110b06 100%);
    color: var(--cream);
    display: flex;
    justify-content: center;
    padding: 32px 16px 48px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  header { text-align: center; }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--gold-soft);
    margin: 0 0 6px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 32px;
    margin: 0;
    letter-spacing: 0.01em;
  }

  .gauge-card {
    width: 100%;
    background: linear-gradient(160deg, var(--surface), #20170f);
    border: 1px solid var(--surface-line);
    border-radius: 24px;
    padding: 22px 20px 26px;
    box-shadow: 0 20px 44px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .gauge { width: 100%; max-width: 320px; display: block; }

  .track {
    fill: none;
    stroke: var(--surface-line);
    stroke-width: 10;
    stroke-linecap: round;
  }

  .sweet-spot {
    fill: none;
    stroke: var(--in-tune);
    stroke-width: 10;
    stroke-linecap: round;
    opacity: 0.5;
  }

  .tick { stroke: var(--muted); stroke-width: 2; }
  .tick-major { stroke: var(--gold-soft); stroke-width: 3; }

  .needle {
    stroke: var(--gold);
    stroke-width: 4;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px rgba(227, 165, 72, 0.5));
  }

  .needle.in-tune {
    stroke: var(--in-tune);
    filter: drop-shadow(0 0 8px rgba(155, 192, 106, 0.7));
  }

  .pivot { fill: var(--gold-soft); }

  .readout { text-align: center; margin-top: -18px; }

  .note-display {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 1;
  }

  #noteOctave {
    font-size: 26px;
    vertical-align: super;
    color: var(--muted);
    margin-left: 2px;
  }

  .freq-display {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--gold-soft);
    margin-top: 6px;
  }

  .cents-display {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
    min-height: 18px;
  }

  .cents-display.in-tune { color: var(--in-tune); }
  .cents-display.off { color: var(--off); }

  .primary-btn {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    padding: 14px 36px;
    border-radius: 999px;
    border: 1px solid transparent;
    background: var(--gold);
    color: #1b130c;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .primary-btn:hover { background: #edb766; }
  .primary-btn:active { transform: scale(0.97); }

  .primary-btn.listening {
    background: transparent;
    border-color: var(--gold-soft);
    color: var(--cream);
  }

  .primary-btn:disabled {
    background: var(--surface-line);
    color: var(--muted);
    cursor: not-allowed;
  }

  .primary-btn:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  .status {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin: -6px 0 0;
    min-height: 18px;
  }

  .strings { width: 100%; }

  .tuning-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .tuning-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #tuningSelect {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    background: var(--surface);
    color: var(--cream);
    border: 1px solid var(--surface-line);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
  }

  #tuningSelect:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .strings-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin: 0 0 12px;
  }

  .strings-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
  }

  .string-btn {
    font-family: 'Inter', sans-serif;
    background: var(--surface);
    border: 1px solid var(--surface-line);
    border-radius: 12px;
    color: var(--cream);
    padding: 10px 2px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .string-btn:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  .string-name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
  }

  .string-sub {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .string-btn.active {
    border-color: var(--gold);
    background: var(--surface-line);
  }

  .string-btn.active .string-sub { color: var(--gold-soft); }

  .footnote {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin: 0;
  }

  @media (max-width: 360px) {
    .note-display { font-size: 52px; }
    h1 { font-size: 28px; }
    .strings-grid { gap: 6px; }
    .string-name { font-size: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .primary-btn { transition: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <p class="eyebrow">Chromatic Tuner</p>
      <h1>Tuner</h1>
    </header>

    <div class="gauge-card">
      <svg class="gauge" viewBox="0 0 320 200" aria-hidden="true">
        <path class="track" d="M 30.1 110 A 150 150 0 0 1 289.9 110" />
        <path class="sweet-spot" d="M 146.93 35.57 A 150 150 0 0 1 173.07 35.57" />
        <g id="ticks"></g>
        <line id="needle" class="needle" x1="160" y1="185" x2="160" y2="45" />
        <circle class="pivot" cx="160" cy="185" r="6" />
      </svg>

      <div class="readout">
        <div class="note-display">
          <span id="noteName">–</span><span id="noteOctave"></span>
        </div>
        <div class="freq-display" id="freqDisplay">0.0 Hz</div>
        <div class="cents-display" id="centsDisplay"></div>
      </div>
    </div>

    <button id="toggleBtn" class="primary-btn">Start listening</button>
    <p class="status" id="statusText" aria-live="polite">Tap start, then play a string.</p>

    <div class="strings">
      <div class="tuning-row">
        <span class="tuning-label">Tuning</span>
        <select id="tuningSelect" aria-label="Tuning preset"></select>
      </div>
      <p class="strings-label">Tap a string to lock onto it</p>
      <div class="strings-grid" id="stringsGrid"></div>
    </div>

    <p class="footnote">Audio is processed on your device only — nothing is recorded or uploaded.</p>
  </div>

  <script>
  (() => {
    const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];

    const TUNINGS = {
      standard: { label: 'Standard', strings: [
        { note: 'E',  octave: 2, freq: 82.41  },
        { note: 'A',  octave: 2, freq: 110.00 },
        { note: 'D',  octave: 3, freq: 146.83 },
        { note: 'G',  octave: 3, freq: 196.00 },
        { note: 'B',  octave: 3, freq: 246.94 },
        { note: 'E',  octave: 4, freq: 329.63 },
      ]},
      dropD: { label: 'Drop D', strings: [
        { note: 'D',  octave: 2, freq: 73.42  },
        { note: 'A',  octave: 2, freq: 110.00 },
        { note: 'D',  octave: 3, freq: 146.83 },
        { note: 'G',  octave: 3, freq: 196.00 },
        { note: 'B',  octave: 3, freq: 246.94 },
        { note: 'E',  octave: 4, freq: 329.63 },
      ]},
      halfStep: { label: 'Half-step down', strings: [
        { note: 'D♯', octave: 2, freq: 77.78  },
        { note: 'G♯', octave: 2, freq: 103.83 },
        { note: 'C♯', octave: 3, freq: 138.59 },
        { note: 'F♯', octave: 3, freq: 185.00 },
        { note: 'A♯', octave: 3, freq: 233.08 },
        { note: 'D♯', octave: 4, freq: 311.13 },
      ]},
      openG: { label: 'Open G', strings: [
        { note: 'D',  octave: 2, freq: 73.42  },
        { note: 'G',  octave: 2, freq: 98.00  },
        { note: 'D',  octave: 3, freq: 146.83 },
        { note: 'G',  octave: 3, freq: 196.00 },
        { note: 'B',  octave: 3, freq: 246.94 },
        { note: 'D',  octave: 4, freq: 293.66 },
      ]},
      dadgad: { label: 'DADGAD', strings: [
        { note: 'D',  octave: 2, freq: 73.42  },
        { note: 'A',  octave: 2, freq: 110.00 },
        { note: 'D',  octave: 3, freq: 146.83 },
        { note: 'G',  octave: 3, freq: 196.00 },
        { note: 'A',  octave: 3, freq: 220.00 },
        { note: 'D',  octave: 4, freq: 293.66 },
      ]},
    };

    let STRINGS = TUNINGS.standard.strings;

    const CX = 160, CY = 185, R_OUT = 150;

    const toggleBtn = document.getElementById('toggleBtn');
    const statusText = document.getElementById('statusText');
    const noteNameEl = document.getElementById('noteName');
    const noteOctaveEl = document.getElementById('noteOctave');
    const freqDisplay = document.getElementById('freqDisplay');
    const centsDisplay = document.getElementById('centsDisplay');
    const needle = document.getElementById('needle');
    const ticksGroup = document.getElementById('ticks');
    const stringsGrid = document.getElementById('stringsGrid');

    let audioCtx = null;
    let analyser = null;
    let stream = null;
    let dataBuffer = null;
    let rafId = null;
    let displayedCents = 0;
    let targetString = null; // index into STRINGS, or null for auto/chromatic mode

    const stringButtons = [];

    const tuningSelect = document.getElementById('tuningSelect');

    // ---- Build / rebuild the reference string buttons for the active tuning ----
    function buildStringButtons() {
      stringsGrid.innerHTML = '';
      stringButtons.length = 0;
      STRINGS.forEach((s, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'string-btn';
        btn.innerHTML =
          '<span class="string-name">' + s.note + '</span>' +
          '<span class="string-sub">' + s.octave + '</span>';
        btn.addEventListener('click', () => {
          targetString = (targetString === i) ? null : i;
          updateStringHighlight();
        });
        stringsGrid.appendChild(btn);
        stringButtons.push(btn);
      });
      updateStringHighlight();
    }

    function updateStringHighlight(matchedIndex) {
      stringButtons.forEach((btn, i) => {
        const active = (targetString !== null) ? i === targetString : i === matchedIndex;
        btn.classList.toggle('active', active);
      });
    }

    // ---- Populate the tuning selector and wire up changes ----
    Object.entries(TUNINGS).forEach(([key, t]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = t.label;
      tuningSelect.appendChild(opt);
    });

    tuningSelect.addEventListener('change', () => {
      STRINGS = TUNINGS[tuningSelect.value].strings;
      targetString = null;
      buildStringButtons();
    });

    buildStringButtons();

    // ---- Build the dial's tick marks (every 10 cents, -50 to +50) ----
    for (let c = -50; c <= 50; c += 10) {
      const major = (c === -50 || c === 0 || c === 50);
      const rIn = major ? 122 : 136;
      const angle = (c * Math.PI) / 180;
      const x1 = CX + R_OUT * Math.sin(angle);
      const y1 = CY - R_OUT * Math.cos(angle);
      const x2 = CX + rIn * Math.sin(angle);
      const y2 = CY - rIn * Math.cos(angle);

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('class', major ? 'tick tick-major' : 'tick tick-minor');
      ticksGroup.appendChild(line);
    }

    // ---- Pitch math: frequency -> nearest note + cents offset ----
    function noteFromFrequency(freq) {
      const midi = 69 + 12 * Math.log2(freq / 440); // A4 = MIDI 69 = 440 Hz
      const rounded = Math.round(midi);
      const cents = (midi - rounded) * 100;
      let index = rounded % 12;
      if (index < 0) index += 12;
      const octave = Math.floor(rounded / 12) - 1;
      return { name: NOTE_NAMES[index], octave, cents };
    }

    // ---- Pitch detection via autocorrelation ----
    // Restricting the search to lags within a guitar-relevant frequency
    // band keeps this fast and avoids most octave-detection errors.
    const MIN_FREQ = 65;   // a little below low E (drop tunings)
    const MAX_FREQ = 1100; // covers higher fretted notes / harmonics

    function correlationAt(buffer, lag) {
      let sum = 0;
      const n = buffer.length - lag;
      for (let i = 0; i < n; i++) sum += buffer[i] * buffer[i + lag];
      return sum;
    }

    function detectPitch(buffer, sampleRate) {
      const size = buffer.length;

      let rms = 0;
      for (let i = 0; i < size; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / size);
      if (rms < 0.012) return null; // too quiet to be a played note

      const minLag = Math.floor(sampleRate / MAX_FREQ);
      const maxLag = Math.ceil(sampleRate / MIN_FREQ);

      let bestLag = -1;
      let bestCorr = -Infinity;
      for (let lag = minLag; lag <= maxLag; lag++) {
        const corr = correlationAt(buffer, lag);
        if (corr > bestCorr) {
          bestCorr = corr;
          bestLag = lag;
        }
      }
      if (bestLag <= 0) return null;

      // Parabolic interpolation around the best lag for sub-sample accuracy
      const c0 = correlationAt(buffer, bestLag - 1);
      const c1 = bestCorr;
      const c2 = correlationAt(buffer, bestLag + 1);
      const denom = c0 - 2 * c1 + c2;
      let shift = denom !== 0 ? (0.5 * (c0 - c2)) / denom : 0;
      shift = Math.max(-1, Math.min(1, shift));

      const refinedLag = bestLag + shift;
      const frequency = sampleRate / refinedLag;
      if (frequency < MIN_FREQ || frequency > MAX_FREQ) return null;
      return frequency;
    }

    // ---- Main update loop ----
    function update() {
      analyser.getFloatTimeDomainData(dataBuffer);
      const freq = detectPitch(dataBuffer, audioCtx.sampleRate);

      let targetCents = 0;

      if (freq) {
        let cents, displayName, displayOctave;

        if (targetString !== null) {
          const s = STRINGS[targetString];
          cents = 1200 * Math.log2(freq / s.freq);
          displayName = s.note;
          displayOctave = s.octave;
        } else {
          const note = noteFromFrequency(freq);
          cents = note.cents;
          displayName = note.name;
          displayOctave = note.octave;
          const matchIdx = STRINGS.findIndex(s => s.note === displayName && s.octave === displayOctave);
          updateStringHighlight(matchIdx);
        }

        noteNameEl.textContent = displayName;
        noteOctaveEl.textContent = displayOctave;
        freqDisplay.textContent = freq.toFixed(1) + ' Hz';

        const absCents = Math.abs(cents);
        if (absCents <= 5) {
          centsDisplay.textContent = 'in tune';
          centsDisplay.className = 'cents-display in-tune';
          needle.classList.add('in-tune');
        } else if (absCents > 50) {
          centsDisplay.textContent = cents > 0 ? 'too sharp — tune down' : 'too flat — tune up';
          centsDisplay.className = 'cents-display off';
          needle.classList.remove('in-tune');
        } else {
          const sign = cents > 0 ? '+' : '';
          const dir = cents > 0 ? 'sharp' : 'flat';
          centsDisplay.textContent = sign + cents.toFixed(0) + ' cents \u00b7 ' + dir;
          centsDisplay.className = 'cents-display off';
          needle.classList.remove('in-tune');
        }

        targetCents = Math.max(-50, Math.min(50, cents));
        statusText.textContent = '';
      } else {
        statusText.textContent = 'Listening… play a note';
        targetCents = 0;
      }

      // Smoothly ease the needle toward its target angle
      displayedCents += (targetCents - displayedCents) * 0.25;
      needle.setAttribute('transform', 'rotate(' + displayedCents.toFixed(2) + ' ' + CX + ' ' + CY + ')');

      rafId = requestAnimationFrame(update);
    }

    // ---- Start / stop microphone ----
    async function start() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        });
      } catch (err) {
        if (location.protocol === 'file:') {
          statusText.textContent = 'Browsers block the microphone on files opened from disk. Run a local server (e.g. "python3 -m http.server" in this folder) and open http://localhost:8000/guitar-tuner.html instead.';
        } else if (err.name === 'NotFoundError') {
          statusText.textContent = 'No microphone was found. Check that one is connected and try again.';
        } else if (err.name === 'NotAllowedError') {
          statusText.textContent = 'Microphone access was blocked. Click the site icon in the address bar, allow the microphone, then reload the page.';
        } else {
          statusText.textContent = 'Couldn\u2019t access the microphone (' + err.name + '). Try a different browser or check your privacy settings.';
        }
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      dataBuffer = new Float32Array(analyser.fftSize);

      const source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser);

      toggleBtn.textContent = 'Stop listening';
      toggleBtn.classList.add('listening');
      statusText.textContent = 'Listening… play a note';

      update();
    }

    function stop() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      if (stream) stream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      audioCtx = null;
      analyser = null;
      stream = null;

      toggleBtn.textContent = 'Start listening';
      toggleBtn.classList.remove('listening');
      statusText.textContent = 'Tap start, then play a string.';

      noteNameEl.textContent = '–';
      noteOctaveEl.textContent = '';
      freqDisplay.textContent = '0.0 Hz';
      centsDisplay.textContent = '';
      centsDisplay.className = 'cents-display';

      displayedCents = 0;
      needle.setAttribute('transform', 'rotate(0 ' + CX + ' ' + CY + ')');
      needle.classList.remove('in-tune');
      updateStringHighlight();
    }

    toggleBtn.addEventListener('click', () => {
      if (audioCtx) stop(); else start();
    });

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      toggleBtn.disabled = true;
      statusText.textContent = 'Microphone access isn\u2019t available here — open this page over HTTPS or localhost.';
    } else if (location.protocol === 'file:') {
      statusText.textContent = 'Opened from a local file — if the mic prompt doesn\u2019t appear, serve this folder (e.g. "python3 -m http.server") and open it at http://localhost.';
    }
  })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
